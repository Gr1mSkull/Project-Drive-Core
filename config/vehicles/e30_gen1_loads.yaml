schema_version: "0.1"
work_package: WP-003
vehicle_profile: e30_gen1
status: proposed
active_dcc_config: config/vehicles/e30_gen1.yaml  # unchanged by this file

evidence_status_enum:
  - measured
  - datasheet
  - estimated
  - unknown

presence_enum:
  - Confirmed
  - Planned
  - Optional
  - TBD

simultaneous_operation_groups:
  - id: GRP-COOLING-HIGH
    description: High-draw cooling and steering loads that may overlap in ENGINE_RUN/RACE
    members: [ehps, water_pump, fan1, fan2]
  - id: GRP-ENGINE-CRITICAL
    description: Engine control and fuel delivery
    members: [ecu_power, fuel_pump, ignition_coils, injectors]
  - id: GRP-LIGHTING-FRONT
    description: Front lighting cluster
    members: [headlights_low, headlights_high, parking_lights]
  - id: GRP-LIGHTING-REAR
    description: Rear lighting and signaling
    members: [brake_lights, indicators, hazard_lights, rear_rain_light]
  - id: GRP-CABIN
    description: Cabin comfort and visibility
    members: [heater_blower, wipers, washer_pump, interior_equipment]
  - id: GRP-WINDOWS
    description: Power window motors (mutual exclusion TBD)
    members: [window_fl, window_fr]
  - id: GRP-AUX
    description: Horn and non-safety UI power
    members: [horn, tablet_supply]
  - id: GRP-CAN-NODES
    description: CAN peripheral nodes (not DCC high-side outputs)
    members: [button_box, radio_board]

